<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Elevate</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

  <!-- ========== ADMIN-ONLY STYLES ========== -->
  <style>
    /* --- Password Gate Overlay --- */
    .admin-gate {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(18, 18, 18, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .admin-gate.open {
      display: flex;
    }
    .gate-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
    }
    .gate-card .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #121212;
      text-decoration: none;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      display: inline-block;
    }
    .gate-card .logo span {
      color: #7C9A82;
    }
    .gate-title {
      font-size: 1.15rem;
      font-weight: 600;
      color: #121212;
      margin: 16px 0 4px;
    }
    .gate-subtitle {
      font-size: 0.85rem;
      color: #6c757d;
      margin-bottom: 24px;
    }
    .gate-field {
      margin-bottom: 14px;
      text-align: left;
    }
    .gate-field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .gate-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      background: #fafafa;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .gate-input:focus {
      outline: none;
      border-color: #7C9A82;
      background: #fff;
    }
    .gate-btn {
      width: 100%;
      padding: 13px;
      background: #7C9A82;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .gate-btn:hover {
      background: #6a8a72;
    }
    .gate-error {
      color: #d63384;
      font-size: 0.82rem;
      margin-top: 12px;
      min-height: 20px;
    }

    /* --- Dashboard Layout --- */
    .admin-content {
      display: none;
      min-height: calc(100vh - 80px);
      background: #f8f9fa;
      padding: 32px 0 60px;
    }
    .admin-content.visible {
      display: block;
    }
    .admin-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .admin-page-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #121212;
      margin-bottom: 28px;
    }

    /* --- Tab Bar --- */
    .admin-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid #e9ecef;
      margin-bottom: 32px;
      overflow-x: auto;
    }
    .admin-tab {
      padding: 12px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: #6c757d;
      background: none;
      border: none;
      border-bottom: 2.5px solid transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
      margin-bottom: -2px;
    }
    .admin-tab:hover {
      color: #121212;
    }
    .admin-tab.active {
      color: #121212;
      font-weight: 600;
      border-bottom-color: #7C9A82;
    }

    /* --- Tab Panels --- */
    .tab-panel {
      display: none;
    }
    .tab-panel.active {
      display: block;
    }

    /* --- Stat Cards --- */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      padding: 28px 24px;
      text-align: center;
    }
    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      color: #121212;
      line-height: 1;
      margin-bottom: 8px;
    }
    .stat-label {
      font-size: 0.82rem;
      font-weight: 500;
      color: #6c757d;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    /* --- Cards & Panels --- */
    .admin-card {
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 24px;
    }
    .admin-card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #121212;
      margin-bottom: 20px;
    }

    /* --- Tables --- */
    .admin-table-wrap {
      overflow-x: auto;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    .admin-table th {
      text-align: left;
      padding: 12px 14px;
      font-weight: 600;
      color: #555;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #e9ecef;
      white-space: nowrap;
    }
    .admin-table td {
      padding: 14px 14px;
      color: #333;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }
    .admin-table tbody tr:nth-child(even) {
      background: #fafbfc;
    }
    .admin-table tbody tr:hover {
      background: #f3f5f7;
    }

    /* --- Status Badges --- */
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.74rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-active   { background: rgba(124,154,130,0.14); color: #5a8264; }
    .badge-expired  { background: rgba(214,51,132,0.1);  color: #d63384; }
    .badge-inactive { background: rgba(108,117,125,0.12); color: #6c757d; }
    .badge-pending  { background: rgba(255,193,7,0.18);   color: #997a00; }
    .badge-approved { background: rgba(124,154,130,0.14); color: #5a8264; }
    .badge-rejected { background: rgba(214,51,132,0.1);  color: #d63384; }

    /* --- Buttons --- */
    .btn-primary {
      padding: 10px 22px;
      background: #7C9A82;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #6a8a72; }

    .btn-outline {
      padding: 10px 22px;
      background: transparent;
      color: #121212;
      border: 1.5px solid #d0d5dd;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-outline:hover { border-color: #121212; background: #f8f9fa; }

    .btn-sm {
      padding: 6px 14px;
      font-size: 0.78rem;
      border-radius: 6px;
    }
    .btn-danger {
      background: #d63384;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-danger:hover { background: #b52a6e; }
    .btn-success {
      background: #7C9A82;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-success:hover { background: #6a8a72; }

    .btn-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* --- Inline Ad Form --- */
    .ad-form-card {
      display: none;
      background: #fff;
      border: 1.5px solid #7C9A82;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 24px;
    }
    .ad-form-card.visible { display: block; }
    .ad-form-card .admin-card-title { color: #7C9A82; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    .form-group.full-width {
      grid-column: 1 / -1;
    }
    .form-group label {
      font-size: 0.78rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .form-group input,
    .form-group select {
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      background: #fafafa;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #7C9A82;
      background: #fff;
    }
    .form-group .img-preview {
      margin-top: 8px;
      max-width: 120px;
      max-height: 60px;
      border-radius: 6px;
      object-fit: cover;
      display: none;
      border: 1px solid #e9ecef;
    }
    .form-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .form-check input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #7C9A82;
    }
    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    /* --- Top Bar for sections --- */
    .section-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .section-topbar h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #121212;
    }

    /* --- Settings --- */
    .settings-card {
      max-width: 480px;
    }
    .settings-msg {
      font-size: 0.82rem;
      margin-top: 14px;
      min-height: 20px;
    }
    .settings-msg.success { color: #5a8264; }
    .settings-msg.error   { color: #d63384; }

    /* --- Footer (admin) --- */
    .admin-footer {
      text-align: center;
      padding: 32px 24px;
      background: #fff;
      border-top: 1px solid #e9ecef;
    }
    .admin-footer p {
      font-size: 0.78rem;
      color: #999;
    }

    /* --- Empty State --- */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #999;
      font-size: 0.9rem;
    }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .stats-row {
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .form-grid {
        grid-template-columns: 1fr;
      }
      .admin-tabs {
        gap: 0;
      }
      .admin-tab {
        padding: 10px 16px;
        font-size: 0.82rem;
      }
      .admin-page-title {
        font-size: 1.35rem;
      }
      .gate-card {
        padding: 32px 24px;
      }
      .admin-card {
        padding: 20px;
      }
      .admin-table {
        font-size: 0.8rem;
      }
      .admin-table th,
      .admin-table td {
        padding: 10px 10px;
      }
    }

    @media (max-width: 480px) {
      .admin-tab {
        padding: 10px 12px;
        font-size: 0.78rem;
      }
      .section-topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }

    /* ========================================
       DARK MODE OVERRIDES (Admin Dashboard)
       ======================================== */
    body.dark-mode .gate-card {
      background: var(--color-surface);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    body.dark-mode .gate-card .logo {
      color: var(--color-text-primary);
    }
    body.dark-mode .gate-title {
      color: var(--color-text-primary);
    }
    body.dark-mode .gate-subtitle {
      color: var(--color-text-muted);
    }
    body.dark-mode .gate-field label {
      color: var(--color-text-secondary);
    }
    body.dark-mode .gate-input {
      background: var(--color-bg);
      border-color: var(--color-border);
      color: var(--color-text-primary);
    }
    body.dark-mode .gate-input:focus {
      background: var(--color-bg-subtle);
      border-color: var(--color-accent);
    }

    body.dark-mode .admin-content {
      background: var(--color-bg);
    }
    body.dark-mode .admin-page-title {
      color: var(--color-text-primary);
    }
    body.dark-mode .admin-tabs {
      border-bottom-color: var(--color-border);
    }
    body.dark-mode .admin-tab {
      color: var(--color-text-muted);
    }
    body.dark-mode .admin-tab:hover,
    body.dark-mode .admin-tab.active {
      color: var(--color-text-primary);
    }
    body.dark-mode .stat-card {
      background: var(--color-surface);
      border-color: var(--color-border);
    }
    body.dark-mode .stat-number {
      color: var(--color-text-primary);
    }
    body.dark-mode .stat-label {
      color: var(--color-text-muted);
    }
    body.dark-mode .admin-card {
      background: var(--color-surface);
      border-color: var(--color-border);
    }
    body.dark-mode .admin-card-title {
      color: var(--color-text-primary);
    }
    body.dark-mode .admin-table th {
      color: var(--color-text-muted);
      border-bottom-color: var(--color-border);
    }
    body.dark-mode .admin-table td {
      color: var(--color-text-secondary);
      border-bottom-color: var(--color-border-light);
    }
    body.dark-mode .admin-table tbody tr:nth-child(even) {
      background: var(--color-bg-subtle);
    }
    body.dark-mode .admin-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.04);
    }
    body.dark-mode .btn-outline {
      color: var(--color-text-primary);
      border-color: var(--color-border);
    }
    body.dark-mode .btn-outline:hover {
      border-color: var(--color-text-primary);
      background: var(--color-surface);
    }
    body.dark-mode .ad-form-card {
      background: var(--color-surface);
      border-color: var(--color-accent);
    }
    body.dark-mode .form-group label {
      color: var(--color-text-secondary);
    }
    body.dark-mode .form-group input,
    body.dark-mode .form-group select {
      background: var(--color-bg);
      border-color: var(--color-border);
      color: var(--color-text-primary);
    }
    body.dark-mode .form-group input:focus,
    body.dark-mode .form-group select:focus {
      background: var(--color-bg-subtle);
      border-color: var(--color-accent);
    }
    body.dark-mode .form-group .img-preview {
      border-color: var(--color-border);
    }
    body.dark-mode .section-topbar h3 {
      color: var(--color-text-primary);
    }
    body.dark-mode .admin-footer {
      background: var(--color-surface);
      border-top-color: var(--color-border);
    }
    body.dark-mode .admin-footer p {
      color: var(--color-text-muted);
    }
    body.dark-mode .empty-state {
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="site-header" id="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo" id="logo">elev<span>.</span>ate</a>

      <nav class="nav-links" id="nav-links">
        <a href="index.html" id="nav-home">Home</a>
        <a href="categories.html" id="nav-categories">Categories</a>
        <a href="about.html" id="nav-about">About</a>
      </nav>

      <div class="header-actions">
        <!-- Auth buttons injected by auth.js -->
        <div class="header-auth" id="header-auth">
          <button onclick="if(window.ElevateAuth) { window.ElevateAuth.showAuthModal('login'); } else { alert('System loading...'); }" class="auth-btn auth-btn-login">Log In</button>
          <button onclick="if(window.ElevateAuth) { window.ElevateAuth.showAuthModal('signup'); } else { alert('System loading...'); }" class="auth-btn auth-btn-signup">Sign Up</button>
        </div>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
          <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>
        <button class="search-btn" id="search-toggle" aria-label="Open search">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
          </svg>
        </button>
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile Nav -->
  <nav class="mobile-nav" id="mobile-nav">
    <a href="index.html">Home</a>
    <a href="categories.html">Categories</a>
    <a href="about.html">About</a>
    <div class="mobile-nav-auth" id="mobile-nav-auth"></div>
  </nav>


  <!-- ========== PASSWORD GATE OVERLAY ========== -->
  <div class="admin-gate open" id="admin-gate">
    <div class="gate-card">
      <div class="logo">elev<span>.</span>ate</div>
      <h2 class="gate-title" id="gate-title">Admin Access</h2>
      <p class="gate-subtitle" id="gate-subtitle">Enter admin password</p>

      <!-- Set Password Form (first time) -->
      <form id="gate-set-form" style="display:none;">
        <div class="gate-field">
          <label for="gate-new-pw">New Password</label>
          <input type="password" id="gate-new-pw" class="gate-input" placeholder="Min 4 characters" minlength="4" required>
        </div>
        <div class="gate-field">
          <label for="gate-confirm-pw">Confirm Password</label>
          <input type="password" id="gate-confirm-pw" class="gate-input" placeholder="Re-enter password" required>
        </div>
        <button type="submit" class="gate-btn">Set Password</button>
      </form>

      <!-- Unlock Form (returning admin) -->
      <form id="gate-unlock-form" style="display:none;">
        <div class="gate-field">
          <label for="gate-pw">Password</label>
          <input type="password" id="gate-pw" class="gate-input" placeholder="Enter admin password" required>
        </div>
        <button type="submit" class="gate-btn">Unlock</button>
      </form>

      <p class="gate-error" id="gate-error"></p>
    </div>
  </div>


  <!-- ========== ADMIN DASHBOARD ========== -->
  <div class="admin-content" id="admin-content">
    <div class="admin-container">
      <h1 class="admin-page-title">Admin Dashboard</h1>

      <!-- Tab Bar -->
      <div class="admin-tabs" id="admin-tabs">
        <button class="admin-tab active" data-tab="tab-overview">Overview</button>
        <button class="admin-tab" data-tab="tab-settings">Settings</button>
      </div>

      <!-- ===== Overview Tab ===== -->
      <div class="tab-panel active" id="tab-overview">
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-number" id="stat-active-ads">0</div>
            <div class="stat-label">Active Ads</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="stat-pending">0</div>
            <div class="stat-label">Pending Requests</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="stat-posts">0</div>
            <div class="stat-label">Total Posts</div>
          </div>
        </div>
      </div>

      <!-- ===== Settings Tab ===== -->
      <div class="tab-panel" id="tab-settings">
        <div class="admin-card settings-card">
          <h3 class="admin-card-title">Change Admin Password</h3>
          <form id="settings-pw-form">
            <div class="gate-field">
              <label for="settings-current-pw">Current Password</label>
              <input type="password" id="settings-current-pw" class="gate-input" placeholder="Enter current password" required>
            </div>
            <div class="gate-field">
              <label for="settings-new-pw">New Password</label>
              <input type="password" id="settings-new-pw" class="gate-input" placeholder="Min 4 characters" minlength="4" required>
            </div>
            <div class="gate-field">
              <label for="settings-confirm-pw">Confirm New Password</label>
              <input type="password" id="settings-confirm-pw" class="gate-input" placeholder="Re-enter new password" required>
            </div>
            <button type="submit" class="btn-primary" style="margin-top:8px;">Update Password</button>
          </form>
          <p class="settings-msg" id="settings-msg"></p>
        </div>
      </div>

    </div><!-- /admin-container -->
  </div><!-- /admin-content -->


  <!-- ========== FOOTER ========== -->
  <footer class="admin-footer">
    <p>&copy; 2026 Elevate. Published by Whitcroft Holdings, a subsidiary of Sterlingmere Holdings. All rights reserved.</p>
  </footer>


  <!-- ========== SCRIPTS ========== -->
  <script src="firebase-config.js"></script>
  <script src="posts.js"></script>
  <script src="auth.js"></script>
  <script src="ads.js"></script>

  <script>
  /* ==========================================================================
     ELEVATE — Admin Dashboard Logic
     Depends on: firebase-config.js, posts.js, auth.js, ads.js
     ========================================================================== */
  (function () {
    'use strict';

    /* ---------- DOM References ---------- */
    const gate            = document.getElementById('admin-gate');
    const gateSetForm     = document.getElementById('gate-set-form');
    const gateUnlockForm  = document.getElementById('gate-unlock-form');
    const gateTitle       = document.getElementById('gate-title');
    const gateSubtitle    = document.getElementById('gate-subtitle');
    const gateError       = document.getElementById('gate-error');
    const adminContent    = document.getElementById('admin-content');

    const tabBar          = document.getElementById('admin-tabs');
    const panels          = document.querySelectorAll('.tab-panel');

    const statActiveAds   = document.getElementById('stat-active-ads');
    const statPending     = document.getElementById('stat-pending');
    const statPosts       = document.getElementById('stat-posts');

    const btnNewAd        = document.getElementById('btn-new-ad');
    const adFormCard      = document.getElementById('ad-form-card');
    const adForm          = document.getElementById('ad-form');
    const adFormTitle     = document.getElementById('ad-form-title');
    const adFormCancel    = document.getElementById('ad-form-cancel');
    const adImageInput    = document.getElementById('ad-image');
    const adImagePreview  = document.getElementById('ad-image-preview');
    const adsTbody        = document.getElementById('ads-tbody');

    const sponsorsTbody   = document.getElementById('sponsors-tbody');

    const settingsForm    = document.getElementById('settings-pw-form');
    const settingsMsg     = document.getElementById('settings-msg');

    /* ---------- Lockout State ---------- */
    let failedAttempts = 0;
    const MAX_ATTEMPTS = 5;
    let lockoutUntil   = 0;

    /* ---------- Editing State ---------- */
    let editingAdId = null;

    /* =====================================================================
       1. AUTH CHECK — redirect non-admins
       ===================================================================== */
    fbAuth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      // Wait for ElevateAds to be ready
      if (typeof ElevateAds === 'undefined' || !ElevateAds.isAdmin) {
        window.location.href = 'index.html';
        return;
      }
      const isAdmin = await ElevateAds.isAdmin();
      if (!isAdmin) {
        window.location.href = 'index.html';
        return;
      }
      initGate();
    });


    /* =====================================================================
       2. PASSWORD GATE
       ===================================================================== */
    async function initGate() {
      try {
        const config = await ElevateAds.getAdminConfig();
        if (config && config.passwordHash) {
          // Password exists — show unlock form
          gateSubtitle.textContent = 'Enter admin password';
          gateUnlockForm.style.display = 'block';
          gateSetForm.style.display = 'none';
        } else {
          // First time — show set password form
          gateSubtitle.textContent = 'Create your admin password';
          gateSetForm.style.display = 'block';
          gateUnlockForm.style.display = 'none';
        }
      } catch (err) {
        // If config fetch fails, default to set password
        gateSubtitle.textContent = 'Create your admin password';
        gateSetForm.style.display = 'block';
        gateUnlockForm.style.display = 'none';
      }
    }

    // Set new password (first time)
    gateSetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      gateError.textContent = '';
      const pw      = document.getElementById('gate-new-pw').value;
      const confirm = document.getElementById('gate-confirm-pw').value;

      if (pw.length < 4) {
        gateError.textContent = 'Password must be at least 4 characters.';
        return;
      }
      if (pw !== confirm) {
        gateError.textContent = 'Passwords do not match.';
        return;
      }

      try {
        await ElevateAds.setAdminPassword(pw);
        unlockDashboard();
      } catch (err) {
        gateError.textContent = 'Failed to set password. Try again.';
      }
    });

    // Unlock with existing password
    gateUnlockForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      gateError.textContent = '';

      // Check lockout
      if (Date.now() < lockoutUntil) {
        const mins = Math.ceil((lockoutUntil - Date.now()) / 60000);
        gateError.textContent = `Too many attempts. Try again in ${mins} minute${mins > 1 ? 's' : ''}.`;
        return;
      }

      const pw = document.getElementById('gate-pw').value;

      try {
        const valid = await ElevateAds.verifyAdminPassword(pw);
        if (valid) {
          failedAttempts = 0;
          unlockDashboard();
        } else {
          failedAttempts++;
          if (failedAttempts >= MAX_ATTEMPTS) {
            lockoutUntil = Date.now() + 5 * 60 * 1000; // 5 minute lockout
            const mins = 5;
            gateError.textContent = `Too many attempts. Try again in ${mins} minutes.`;
          } else {
            gateError.textContent = `Incorrect password. ${MAX_ATTEMPTS - failedAttempts} attempt${MAX_ATTEMPTS - failedAttempts !== 1 ? 's' : ''} remaining.`;
          }
        }
      } catch (err) {
        gateError.textContent = 'Verification failed. Try again.';
      }
    });

    function unlockDashboard() {
      gate.classList.remove('open');
      adminContent.classList.add('visible');
      loadOverviewStats();
    }


    /* =====================================================================
       3. TAB SWITCHING
       ===================================================================== */
    tabBar.addEventListener('click', (e) => {
      const btn = e.target.closest('.admin-tab');
      if (!btn) return;

      tabBar.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');

      const targetId = btn.dataset.tab;
      panels.forEach(p => {
        p.classList.toggle('active', p.id === targetId);
      });

      // Lazy-load data when switching tabs
      if (targetId === 'tab-overview') loadOverviewStats();
    });


    /* =====================================================================
       4. OVERVIEW — Load Stats
       ===================================================================== */
    async function loadOverviewStats() {
      try {
        // AdSense is automated, so Active Ads and Pending Requests are N/A
        document.getElementById('stat-active-ads').textContent = 'Auto';
        document.getElementById('stat-pending').textContent = 'N/A';

        // Total Posts
        const posts = await ElevatePosts.getAllPosts();
        const seedCount = (ElevatePosts.SEED_POSTS || []).length;
        document.getElementById('stat-posts').textContent = posts.length + seedCount;
      } catch (err) {
        console.error('Failed to load overview stats:', err);
      }
    }


    /* =====================================================================
       5. SETTINGS — Change Password
       ===================================================================== */
    settingsForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      settingsMsg.textContent = '';
      settingsMsg.className = 'settings-msg';

      const currentPw = document.getElementById('settings-current-pw').value;
      const newPw     = document.getElementById('settings-new-pw').value;
      const confirmPw = document.getElementById('settings-confirm-pw').value;

      if (newPw.length < 4) {
        settingsMsg.textContent = 'New password must be at least 4 characters.';
        settingsMsg.classList.add('error');
        return;
      }
      if (newPw !== confirmPw) {
        settingsMsg.textContent = 'New passwords do not match.';
        settingsMsg.classList.add('error');
        return;
      }

      try {
        const valid = await ElevateAds.verifyAdminPassword(currentPw);
        if (!valid) {
          settingsMsg.textContent = 'Current password is incorrect.';
          settingsMsg.classList.add('error');
          return;
        }

        await ElevateAds.setAdminPassword(newPw);
        settingsMsg.textContent = 'Password updated successfully.';
        settingsMsg.classList.add('success');
        settingsForm.reset();
      } catch (err) {
        settingsMsg.textContent = 'Failed to update password. Try again.';
        settingsMsg.classList.add('error');
      }
    });


    /* =====================================================================
       HELPERS
       ===================================================================== */
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDateShort(dateStr) {
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch {
        return dateStr;
      }
    }

    /* ---------- Public API (for inline onclick handlers) ---------- */
    window.AdminDash = {
    };

  })();
  </script>

</body>
</html>
